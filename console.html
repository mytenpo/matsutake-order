<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>🎤 MATUTAKE コンソール</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  body{
    margin:0; padding:0; font-family:sans-serif; background:#07070f; color:#fff;
  }
  .header{
    width:100%; padding:14px 20px; text-align:center; background:#C41E5A;
    font-size:24px; font-weight:900; box-sizing:border-box;
  }
  .status{ margin:8px 12px; font-size:15px; text-align:center; color:#aaa; }
  .enable-wrap{ text-align:center; }
  .enable-btn{
    margin-top:30px; padding:20px 40px; font-size:24px; font-weight:700;
    border-radius:12px; border:none; background:#ff2d78; color:#fff; cursor:pointer;
  }

  /* ── 3カラムレイアウト ─────────────────────────── */
  .dash{
    display:grid; grid-template-columns:1fr 1.4fr 1fr; gap:10px;
    padding:10px; box-sizing:border-box; align-items:start;
  }
  @media (max-width:900px){
    .dash{ grid-template-columns:1fr; }
    .col-feed{ order:-1; }
  }
  .col{ display:flex; flex-direction:column; gap:10px; }

  /* ── テーブルサマリーパネル ────────────────────── */
  .tpanel{
    background:#12121e; border-radius:12px; padding:12px 14px;
    border:1px solid rgba(255,255,255,.08);
  }
  .tpanel.active{ border-color:rgba(255,45,120,.45); }
  .tpanel-head{ display:flex; justify-content:space-between; align-items:center; }
  .tpanel-title{ font-size:19px; font-weight:900; color:#ff9ec2; }
  .tpanel-visit{ font-size:12px; color:#888; }
  .tpanel-row{ display:flex; justify-content:space-between; font-size:14px; margin-top:6px; color:#ccc; }
  .tpanel-row .val{ color:#fff; font-weight:700; }
  .tpanel-items{ font-size:13px; color:#9ad; margin-top:6px; line-height:1.5; word-break:break-all; }
  .tpanel-total{
    display:flex; justify-content:space-between; margin-top:8px; padding-top:8px;
    border-top:1px dashed rgba(255,255,255,.15); font-size:16px; font-weight:900; color:#ffd34d;
  }
  .guests-adjust{ display:flex; align-items:center; gap:8px; }
  .gbtn{
    width:30px; height:30px; border-radius:8px; border:1px solid rgba(255,255,255,.2);
    background:rgba(255,255,255,.06); color:#fff; font-size:17px; font-weight:900; cursor:pointer;
  }
  .gbtn:disabled{ opacity:.4; }
  .gval{ min-width:44px; text-align:center; font-size:15px; font-weight:700; }
  .empty-note{ font-size:13px; color:#666; margin-top:6px; }

  /* ── 中央：注文フィード ────────────────────────── */
  .feed-title{ font-size:16px; font-weight:900; color:#aaa; padding:2px 4px; }
  .order-card{
    background:#15151f; border-radius:10px; padding:12px 14px;
    border-left:6px solid #ff2d78;
  }
  .order-top{ display:flex; justify-content:space-between; align-items:center; }
  .order-card.new{ animation:flash 1.2s ease-in-out 3; }
  @keyframes flash{
    0%,100%{ background:#15151f; }
    50%{ background:#4a1030; }
  }
  .tbadge{
    display:inline-block; min-width:56px; text-align:center;
    background:#ff2d78; color:#fff; font-size:22px; font-weight:900;
    padding:6px 8px; border-radius:10px; margin-right:10px; vertical-align:middle;
  }
  .order-name{ font-size:17px; font-weight:700; display:inline; vertical-align:middle; }
  .order-meta{ font-size:13px; color:#999; margin-top:4px; }
  .order-time{ font-size:15px; color:#ff9ec2; white-space:nowrap; }
  .status-btns{ display:flex; gap:8px; margin-top:10px; }
  .status-btn{
    flex:1; padding:9px 4px; border-radius:8px; border:1px solid rgba(255,255,255,.15);
    background:rgba(255,255,255,.05); color:#aaa; font-size:13px; font-weight:700;
    cursor:pointer; font-family:inherit;
  }
  .status-btn:disabled{ opacity:.5; }
  .status-btn.status-pending.active{ background:rgba(255,180,0,.18); color:#ffb400; border-color:rgba(255,180,0,.4); }
  .status-btn.status-done.active{ background:rgba(16,185,129,.18); color:#10b981; border-color:rgba(16,185,129,.4); }
  .status-btn.status-cancel.active{ background:rgba(255,45,120,.18); color:#ff2d78; border-color:rgba(255,45,120,.4); }

  /* ── コンソールナビ ── */
  .nav{ margin-top:8px; display:flex; justify-content:center; gap:8px; }
  .nav-btn{ padding:8px 22px; border-radius:20px; border:1px solid rgba(255,255,255,.35); background:transparent; color:#fff; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; opacity:.65; }
  .nav-btn.active{ background:#fff; color:#C41E5A; opacity:1; }

  /* ── 会計ビュー ── */
  .co-wrap{ max-width:560px; margin:0 auto; padding:14px 16px 40px; }
  .co-sec{ font-size:14px; color:#999; margin:10px 0 6px; font-weight:600; }
  .co-tgrid{ display:grid; grid-template-columns:repeat(6,1fr); gap:7px; }
  .co-tbtn{ padding:14px 0; border-radius:11px; border:1px solid rgba(255,255,255,.15); background:rgba(255,255,255,.05); color:#fff; font-size:16px; font-weight:800; cursor:pointer; font-family:inherit; }
  .co-tbtn.active{ border-color:#ff2d78; background:rgba(255,45,120,.16); color:#ff6ba0; }
  .co-bill{ background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1); border-radius:14px; padding:14px; margin-top:14px; display:none; }
  .co-bill.show{ display:block; }
  .co-bill-table{ font-size:19px; font-weight:800; color:#00d4ff; text-align:center; margin-bottom:8px; }
  .co-item{ display:flex; justify-content:space-between; font-size:14.5px; padding:4px 0; border-bottom:1px dashed rgba(255,255,255,.08); }
  .co-item .nm{ flex:1; }
  .co-item .qt{ width:46px; text-align:center; color:#888; }
  .co-item .am{ width:78px; text-align:right; }
  .co-item.cancelled{ opacity:.35; text-decoration:line-through; }
  .co-sum{ display:flex; justify-content:space-between; font-size:14.5px; padding:5px 0; color:#bbb; }
  .co-sum.co-grand{ font-size:22px; font-weight:800; color:#ff2d78; border-top:1px solid rgba(255,255,255,.15); margin-top:5px; padding-top:9px; }
  .co-kara-note{ font-size:12px; color:#777; text-align:right; }
  .co-pgrid{ display:grid; grid-template-columns:repeat(3,1fr); gap:7px; }
  .co-pbtn{ padding:13px 0; border-radius:11px; border:1px solid rgba(255,255,255,.18); background:rgba(255,255,255,.05); color:#fff; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; }
  .co-pbtn.active{ border-color:#12b76a; background:rgba(18,183,106,.18); color:#4ade80; }
  .co-qgrid{ display:grid; grid-template-columns:repeat(3,1fr); gap:7px; margin-bottom:7px; }
  .co-qbtn{ padding:10px 0; border-radius:10px; border:1px solid rgba(255,255,255,.15); background:transparent; color:#ccc; font-size:14px; cursor:pointer; font-family:inherit; }
  .co-tender{ width:100%; padding:12px; border-radius:11px; border:1px solid rgba(255,255,255,.2); background:rgba(0,0,0,.3); color:#fff; font-size:22px; font-weight:800; text-align:right; font-family:inherit; }
  .co-change{ text-align:right; font-size:20px; font-weight:800; color:#ffd166; padding:8px 2px 0; min-height:30px; }
  .co-print{ width:100%; padding:15px; border-radius:12px; border:none; background:linear-gradient(135deg,#ff2d78,#ff6b35); color:#fff; font-size:18px; font-weight:800; cursor:pointer; font-family:inherit; margin-top:14px; }
  .co-row2{ display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:8px; }
  .co-drawer{ padding:13px 0; border-radius:12px; border:1px solid rgba(255,209,102,.4); background:transparent; color:#ffd166; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; }
  .co-done{ padding:13px 0; border-radius:12px; border:none; background:#12b76a; color:#fff; font-size:16px; font-weight:800; cursor:pointer; font-family:inherit; }
  .co-done:disabled{ opacity:.4; }
  .co-reload{ width:100%; padding:9px; border-radius:10px; border:1px solid rgba(255,255,255,.12); background:transparent; color:#888; font-size:13px; cursor:pointer; font-family:inherit; margin-top:7px; }
  .co-empty{ color:#666; text-align:center; padding:22px 0; font-size:15px; }
  .co-empty.err{ color:#ff6b6b; }

  </style>
</head>
<body>
  <div class="header">🎤 MATUTAKE コンソール <span style="font-size:13px;opacity:.6;">v3</span>
    <div class="nav">
      <button class="nav-btn active" id="nav-kitchen" onclick="showView('kitchen')">🍳 キッチン</button>
      <button class="nav-btn" id="nav-checkout" onclick="showView('checkout')">💴 会計</button>
    </div>
  </div>
  <div id="view-kitchen">
  <div class="status" id="status">通知を有効にしてください</div>
  <div class="enable-wrap"><button class="enable-btn" id="enableBtn">🔊 通知を有効にする</button></div>

  <div class="dash" id="dash" style="display:none;">
    <div class="col" id="col-left"></div>
    <div class="col col-feed">
      <div class="feed-title">📋 注文フィード（新しい順）</div>
      <div id="list"></div>
    </div>
    <div class="col" id="col-right"></div>
  </div>
  </div><!-- /view-kitchen -->

  <!-- ═══════════ 会計ビュー ═══════════ -->
  <div id="view-checkout" style="display:none;">
    <div class="co-wrap">
      <div class="co-sec">テーブルを選択</div>
      <div class="co-tgrid" id="co-tgrid"></div>

      <div class="co-bill" id="co-bill">
        <div class="co-bill-table" id="co-bill-table"></div>
        <div id="co-bill-items"></div>
        <div style="margin-top:10px">
          <div class="co-sum"><span>小計（税込・注文分）</span><span id="co-s-order">¥0</span></div>
          <div class="co-sum"><span>🎤 カラオケチャージ</span><span id="co-s-kara">¥0</span></div>
          <div class="co-kara-note" id="co-s-kara-note"></div>
          <div class="co-sum co-grand"><span>現在金額</span><span id="co-s-grand">¥0</span></div>
        </div>

        <div class="co-sec" style="margin-top:14px">支払方法</div>
        <div class="co-pgrid">
          <button class="co-pbtn" id="pay-現金" onclick="selPay('現金')">💵 現金</button>
          <button class="co-pbtn" id="pay-カード" onclick="selPay('カード')">💳 カード</button>
          <button class="co-pbtn" id="pay-QR" onclick="selPay('QR')">📱 QR</button>
        </div>

        <div id="co-cash" style="display:none;">
          <div class="co-sec" style="margin-top:12px">お預り金額</div>
          <div class="co-qgrid">
            <button class="co-qbtn" onclick="setTender('exact')">ぴったり</button>
            <button class="co-qbtn" onclick="setTender(5000)">¥5,000</button>
            <button class="co-qbtn" onclick="setTender(10000)">¥10,000</button>
          </div>
          <input class="co-tender" id="co-tender" type="tel" inputmode="numeric" placeholder="金額を入力" oninput="calcChange()">
          <div class="co-change" id="co-change"></div>
        </div>

        <button class="co-print" onclick="printReceipt()">🖨 レシート印刷（＋ドロワー）</button>
        <div class="co-row2">
          <button class="co-drawer" onclick="openDrawer()">💰 ドロワーのみ開く</button>
          <button class="co-done" id="co-done" onclick="doCheckout()">✅ 会計完了</button>
        </div>
        <button class="co-reload" onclick="resetVisit()" style="color:#ff8a8e;border-color:rgba(229,72,77,.4)">🗑 来店取消（誤スキャン等・回転は進めない）</button>
        <button class="co-reload" onclick="loadBill()">🔄 再読み込み</button>
        <button class="co-reload" onclick="printTest()" style="color:#666">🧪 テスト印刷（3行・切り分け用）</button>
      </div>
      <div class="co-empty" id="co-msg">テーブルを選択してください</div>
    </div>
  </div><!-- /view-checkout -->

var audioCtx = null;
var audioBuffer = null;

function base64ToArrayBuffer(base64){
  var binary = atob(base64);
  var bytes = new Uint8Array(binary.length);
  for(var i=0;i<binary.length;i++){ bytes[i] = binary.charCodeAt(i); }
  return bytes.buffer;
}

async function initAudio(){
  try{
    var AC = window.AudioContext || window.webkitAudioContext;
    audioCtx = new AC();
    if(audioCtx.state === "suspended"){ await audioCtx.resume(); }
    var base64 = BEEP_DATA_URI.split(",")[1];
    var arrayBuf = base64ToArrayBuffer(base64);
    audioBuffer = await audioCtx.decodeAudioData(arrayBuf);
  }catch(e){
    document.getElementById("status").textContent = "音声初期化エラー: " + e;
  }
}

var BEEP_GAIN = 2.5;   // 音量倍率（1=等倍。2.5=+150%。大きすぎて割れる場合はここを下げる）

function beep(){
  if(!audioCtx || !audioBuffer) return;
  try{
    if(audioCtx.state === "suspended"){ audioCtx.resume(); }
    var src = audioCtx.createBufferSource();
    src.buffer = audioBuffer;
    var gain = audioCtx.createGain();
    gain.gain.value = BEEP_GAIN;
    // 音割れをある程度抑えるコンプレッサーを挟む
    var comp = audioCtx.createDynamicsCompressor();
    src.connect(gain);
    gain.connect(comp);
    comp.connect(audioCtx.destination);
    src.start(0);
  }catch(e){
    document.getElementById("status").textContent = "再生エラー: " + e;
  }
}

var wakeLock = null;
async function requestWakeLock(){
  try{
    if("wakeLock" in navigator){
      wakeLock = await navigator.wakeLock.request("screen");
    }
  }catch(e){}
}

document.addEventListener("visibilitychange", function(){
  if(document.visibilityState === "visible" && enabled){
    requestWakeLock();
    if(audioCtx && audioCtx.state === "suspended"){ audioCtx.resume(); }
    poll();
  }
});

document.getElementById("enableBtn").addEventListener("click", async function(){
  await initAudio();
  beep();
  enabled = true;
  requestWakeLock();
  document.getElementById("status").textContent = "通知有効：注文を監視中…";
  document.getElementById("enableBtn").style.display = "none";
  document.getElementById("dash").style.display = "grid";
  poll();
  setInterval(poll, 8000);
});

function orderKey(o){
  return o.time + "_" + o.table + "_" + o.name + "_" + o.visit;
}

var GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzHkfQ0hms6isOHg09y83rUktyjjO7vMCWuGv0yeeSZrZkkDhL8bKLJEGu87zJyv1h6tw/exec";

// カラオケチャージ（1人あたり：最初の2時間¥1,500 ＋ 以降2時間枠ごと¥500）
var KARA_BASE = 1500, KARA_ADD = 500, KARA_BLOCK_MS = 2*60*60*1000;
var clockOffset = 0;     // サーバー時刻との差（端末の時計ズレ対策）
var lastTables = null;   // 直近のテーブル情報
var lastOrders = [];

function calcKara(karaStart, guests){
  if(!karaStart) return null;
  var now = Date.now() + clockOffset;
  var elapsed = Math.max(0, now - karaStart);
  var blocks = Math.floor(elapsed / KARA_BLOCK_MS) + 1;
  var per = KARA_BASE + (blocks-1)*KARA_ADD;
  var g = guests || 1;
  var h = Math.floor(elapsed/3600000), m = Math.floor((elapsed%3600000)/60000);
  return { charge: per*g, label: h+"時間"+m+"分" };
}

function poll(){
  var now = new Date().toLocaleTimeString("ja-JP");
  fetch(GAS_WEBAPP_URL + "?action=getTablesInfo")
    .then(function(r){ return r.json(); })
    .then(function(res){
      if(!res || !res.success){
        document.getElementById("status").textContent = "取得失敗("+now+"): " + (res && res.error);
        return;
      }
      if(res.serverNow){ clockOffset = res.serverNow - Date.now(); }
      var orders = res.orders || [];
      lastOrders = orders;
      lastTables = res.tables || {};

      var newOnes = [];
      orders.forEach(function(o){
        var k = orderKey(o);
        if(!knownKeys.has(k)){
          knownKeys.add(k);
          if(!firstLoad) newOnes.push(o);
        }
      });
      if(newOnes.length > 0 && enabled){ beep(); }

      renderList(orders, newOnes);
      renderTables();
      firstLoad = false;
      document.getElementById("status").textContent =
        "監視中（最終チェック: "+now+"／本日の注文: "+orders.length+"件）";
    })
    .catch(function(err){
      document.getElementById("status").textContent = "取得エラー("+now+"): " + err;
    });
}

// ── 左右のテーブルサマリー ──────────────────────────
function renderTables(){
  if(!lastTables) return;
  var left = ["1","2","3","C1","C2","C3"], right = ["4","5","6","C4","C5","C6"];
  document.getElementById("col-left").innerHTML  = left.map(tablePanelHTML).join("");
  document.getElementById("col-right").innerHTML = right.map(tablePanelHTML).join("");
}

function tablePanelHTML(t){
  var info = lastTables[t] || {};
  var k = calcKara(info.karaStart, info.guests);
  var active = !!info.karaStart;

  // 現在の来店回・キャンセル以外の品目を「品名×数」で集計
  var items = {};
  lastOrders.forEach(function(o){
    if(o.table !== t) return;
    if(o.visit !== info.visit) return;
    if(o.status === "キャンセル") return;
    items[o.name] = (items[o.name]||0) + o.qty;
  });
  var itemNames = Object.keys(items);
  var itemsHTML = itemNames.length
    ? itemNames.map(function(n){ return n + "×" + items[n]; }).join("、")
    : "";

  var orderTotal = info.orderTotal || 0;
  var charge = k ? k.charge : 0;
  var total = orderTotal + charge;

  var guestsLabel = info.guests ? (info.guests + "名様") : "未入力";

  var html = '<div class="tpanel'+(active?' active':'')+'">'
    + '<div class="tpanel-head">'
    +   '<div class="tpanel-title">'+(t.charAt(0)==="C" ? "カウンター "+t : "テーブル "+t)+'</div>'
    +   '<div class="tpanel-visit">'+(info.visit||1)+'回転目</div>'
    + '</div>';

  if(!active && itemNames.length===0){
    html += '<div class="empty-note">ご来店なし</div></div>';
    return html;
  }

  html += '<div class="tpanel-row"><span>人数</span>'
    + '<span class="guests-adjust">'
    +   '<button class="gbtn" onclick="adjustGuests(\''+t+'\',-1)">－</button>'
    +   '<span class="gval">'+guestsLabel+'</span>'
    +   '<button class="gbtn" onclick="adjustGuests(\''+t+'\',1)">＋</button>'
    + '</span></div>';

  if(k){
    html += '<div class="tpanel-row"><span>🎤 チャージ（'+k.label+'）</span><span class="val">¥'+charge.toLocaleString()+'</span></div>';
  }
  html += '<div class="tpanel-row"><span>ご注文</span><span class="val">¥'+orderTotal.toLocaleString()+'</span></div>';
  if(itemsHTML){
    html += '<div class="tpanel-items">'+itemsHTML+'</div>';
  }
  html += '<div class="tpanel-total"><span>合計（チャージ込）</span><span>¥'+total.toLocaleString()+'</span></div>';
  html += '</div>';
  return html;
}

// キッチン側での人数補正（お客様の入力ミス・途中合流に対応）
function adjustGuests(table, delta){
  var info = lastTables && lastTables[table];
  var cur = (info && info.guests) ? info.guests : 0;
  var next = cur + delta;
  if(next < 1) next = 1;
  if(next > 20) next = 20;
  if(next === cur) return;
  fetch(GAS_WEBAPP_URL + "?action=setGuests&table="+encodeURIComponent(table)+"&guests="+next)
    .then(function(r){ return r.json(); })
    .then(function(res){
      if(res && res.success){
        lastTables[table].guests = res.guests;
        renderTables();
      }else{
        document.getElementById("status").textContent = "人数更新失敗: " + (res && res.error);
      }
    })
    .catch(function(err){
      document.getElementById("status").textContent = "人数更新エラー: " + err;
    });
}

// ── 中央：注文フィード ──────────────────────────────
function renderList(orders, newOnes){
  var newKeys = new Set(newOnes.map(orderKey));
  var recent;
  try{
    recent = orders.slice().sort(function(a, b){
      var ta = String(a.time), tb = String(b.time);
      if (ta === tb) return 0;
      return ta < tb ? 1 : -1;
    }).slice(0, 20);
  }catch(e){
    recent = orders.slice(-20).reverse();
  }
  var list = document.getElementById("list");
  var STATUS_OPTIONS = ["未対応", "対応済み", "キャンセル"];
  list.innerHTML = recent.map(function(o){
    var isNew = newKeys.has(orderKey(o));
    var btnsHTML = STATUS_OPTIONS.map(function(s){
      var active = (o.status === s);
      return '<button class="status-btn '+statusClass_(s)+(active?' active':'')+'" '
        + 'onclick="changeStatus(this,\''+escapeAttr_(o.table)+'\',\''+escapeAttr_(o.time)+'\',\''+escapeAttr_(o.name)+'\','+o.visit+',\''+s+'\')">'+s+'</button>';
    }).join("");
    return '<div class="order-card'+(isNew?' new':'')+'">'
      + '<div class="order-top">'
      + '<div><span class="tbadge">'+(String(o.table).charAt(0)==="C" ? o.table : o.table+'卓')+'</span>'
      + '<span class="order-name">'+o.name+' ×'+o.qty+'</span>'
      + '<div class="order-meta">'+o.visit+'回転目</div></div>'
      + '<div class="order-time">'+o.time+'</div></div>'
      + '<div class="status-btns">'+btnsHTML+'</div>'
      + '</div>';
  }).join("");
}

function statusClass_(s){
  if(s==="未対応") return "status-pending";
  if(s==="対応済み") return "status-done";
  return "status-cancel";
}
function escapeAttr_(s){
  return String(s).replace(/'/g, "\\'");
}

function changeStatus(btn, table, time, name, visit, newStatus){
  if(newStatus === "キャンセル" && !confirm("この注文をキャンセルにしますか？")) return;
  btn.closest(".status-btns").querySelectorAll(".status-btn").forEach(function(b){ b.disabled = true; });
  fetch(GAS_WEBAPP_URL + "?action=updateOrderStatus"
    + "&table=" + encodeURIComponent(table)
    + "&time=" + encodeURIComponent(time)
    + "&name=" + encodeURIComponent(name)
    + "&visit=" + encodeURIComponent(visit)
    + "&status=" + encodeURIComponent(newStatus))
    .then(function(r){ return r.json(); })
    .then(function(res){
      if(!res || !res.success){
        document.getElementById("status").textContent = "更新失敗: " + (res && res.error);
      }
      poll();
    })
    .catch(function(err){
      document.getElementById("status").textContent = "更新エラー: " + err;
    });
}

// チャージの経過時間表示を1分ごとに更新（ポーリングとは別に画面だけ更新）
setInterval(function(){ if(enabled) renderTables(); }, 60000);

// ═══════════════════ ビュー切替 ═══════════════════
function showView(v){

  document.getElementById("view-checkout").style.display = (v==="checkout") ? "" : "none";

}

// ═══════════════════ 会計ビュー ═══════════════════
var STORE_NAME = "カラオケ♪酒場 マツタケ";
var coTable = null, coBill = null, coPay = null;

var CO_TABLES = ["1","2","3","4","5","6","C1","C2","C3","C4","C5","C6"];
document.getElementById("co-tgrid").innerHTML = CO_TABLES.map(function(t){
  return '<button class="co-tbtn" id="co-tb'+t+'" onclick="coSelTable(\''+t+'\')">'+t+'</button>';
}).join("");

function coSelTable(t){
  coTable = t;
  CO_TABLES.forEach(function(x){
    document.getElementById("co-tb"+x).className = "co-tbtn"+(x===t?" active":"");
  });
  coPay = null; renderPay();
  document.getElementById("co-tender").value = "";
  document.getElementById("co-change").textContent = "";
  loadBill();
}

function loadBill(){
  if(!coTable) return;
  var msg = document.getElementById("co-msg");
  msg.textContent = "読み込み中..."; msg.className = "co-empty"; msg.style.display = "block";
  document.getElementById("co-bill").className = "co-bill";
  Promise.all([
    fetch(GAS_WEBAPP_URL+"?action=getOrders&table="+encodeURIComponent(coTable)).then(function(r){return r.json();}),
    fetch(GAS_WEBAPP_URL+"?action=getKaraokeInfo&table="+encodeURIComponent(coTable)).then(function(r){return r.json();})
  ]).then(function(res){
    var ord = res[0], kara = res[1];
    if(!ord || !ord.success){ coErr("注文の取得に失敗しました"); return; }
    var orders = ord.orders || [];
    var orderTotal = orders.reduce(function(s,o){
      return s + (o.status==="キャンセル" ? 0 : (Number(o.amount)||0));
    }, 0);
    var karaCharge = 0, karaLabel = "利用記録なし", karaGuests = null;
    if(kara && kara.success && kara.startTime){
      karaGuests = Number(kara.guests) || 1;
      var elapsed = Math.max(0, (Date.now()+clockOffset) - Number(kara.startTime));
      var blocks = Math.floor(elapsed / KARA_BLOCK_MS) + 1;
      var per = KARA_BASE + (blocks-1)*KARA_ADD;
      karaCharge = per * karaGuests;
      var h = Math.floor(elapsed/3600000), m = Math.floor((elapsed%3600000)/60000);
      karaLabel = karaGuests+"名様 × ¥"+per.toLocaleString()+"（ご利用 "+h+"時間"+m+"分）"+(kara.guests?"":" ※人数未入力");
    }
    coBill = {orders:orders, orderTotal:orderTotal, karaCharge:karaCharge, karaLabel:karaLabel, karaGuests:karaGuests, grand:orderTotal+karaCharge};
    renderCoBill();
  }).catch(function(){ coErr("通信エラーが発生しました"); });
}

function coErr(t){
  var msg = document.getElementById("co-msg");
  msg.textContent = t; msg.className = "co-empty err";
}

function renderCoBill(){
  var b = coBill;
  document.getElementById("co-msg").style.display = "none";
  document.getElementById("co-bill").className = "co-bill show";
  document.getElementById("co-bill-table").textContent = "テーブル "+coTable;
  if(b.orders.length===0){
    document.getElementById("co-bill-items").innerHTML = '<div class="co-empty">注文はありません</div>';
  } else {
    document.getElementById("co-bill-items").innerHTML = b.orders.map(function(o){
      var c = o.status==="キャンセル";
      return '<div class="co-item'+(c?' cancelled':'')+'"><span class="nm">'+o.name+'</span><span class="qt">×'+o.qty+'</span><span class="am">¥'+Number(o.amount).toLocaleString()+'</span></div>';
    }).join("");
  }
  document.getElementById("co-s-order").textContent = "¥"+b.orderTotal.toLocaleString();
  document.getElementById("co-s-kara").textContent = "¥"+b.karaCharge.toLocaleString();
  document.getElementById("co-s-kara-note").textContent = b.karaLabel;
  document.getElementById("co-s-grand").textContent = "¥"+b.grand.toLocaleString();
  calcChange();
}

// ── 支払方法・お釣り ──
function selPay(p){
  coPay = p; renderPay();
  document.getElementById("co-cash").style.display = (p==="現金") ? "" : "none";
  if(p!=="現金"){ document.getElementById("co-tender").value=""; document.getElementById("co-change").textContent=""; }
}
function renderPay(){
  ["現金","カード","QR"].forEach(function(p){
    document.getElementById("pay-"+p).className = "co-pbtn"+(coPay===p?" active":"");
  });
}
function setTender(v){
  var inp = document.getElementById("co-tender");
  inp.value = (v==="exact" && coBill) ? coBill.grand : v;
  calcChange();
}
function calcChange(){
  var el = document.getElementById("co-change");
  if(!coBill){ el.textContent=""; return; }
  var t = parseInt(document.getElementById("co-tender").value, 10);
  if(!t){ el.textContent=""; return; }
  var diff = t - coBill.grand;
  el.textContent = diff >= 0 ? "お釣り ¥"+diff.toLocaleString() : "不足 ¥"+Math.abs(diff).toLocaleString();
  el.style.color = diff >= 0 ? "#ffd166" : "#ff6b6b";
}

// ── レシート印刷（Star PassPRNT / mPOP 58mm・ドロワー連動） ──
function esc2(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function buildReceiptHTML(){
  var b = coBill;
  var now = new Date();
  var dt = now.getFullYear()+"/"+(now.getMonth()+1)+"/"+now.getDate()+" "
         + ("0"+now.getHours()).slice(-2)+":"+("0"+now.getMinutes()).slice(-2);
  var rows = b.orders.filter(function(o){ return o.status!=="キャンセル"; }).map(function(o){
    return '<tr><td>'+esc2(o.name)+'</td><td class="c">×'+o.qty+'</td><td class="r">¥'+Number(o.amount).toLocaleString()+'</td></tr>';
  }).join("");
  var innerTax = Math.floor(b.grand * 10 / 110);
  var payRows = "";
  if(coPay){ payRows += '<tr><td>お支払方法</td><td class="r">'+esc2(coPay)+'</td></tr>'; }
  if(coPay==="現金"){
    var t = parseInt(document.getElementById("co-tender").value,10);
    if(t && t >= b.grand){
      payRows += '<tr><td>お預り</td><td class="r">¥'+t.toLocaleString()+'</td></tr>';
      payRows += '<tr><td>お釣り</td><td class="r">¥'+(t-b.grand).toLocaleString()+'</td></tr>';
    }
  }
  return '<html><head><meta charset="utf-8"><style>'
    +'body{font-family:sans-serif;width:384px;margin:0;padding:0;font-size:22px;color:#000}'
    +'.center{text-align:center}.big{font-size:28px;font-weight:bold}'
    +'table{width:100%;border-collapse:collapse}td{padding:2px 0;vertical-align:top}'
    +'.c{text-align:center;width:60px}.r{text-align:right;width:110px}'
    +'.line{border-top:1px dashed #000;margin:6px 0}'
    +'.grand{font-size:28px;font-weight:bold}'
    +'</style></head><body>'
    +'<div class="center big">'+esc2(STORE_NAME)+'</div>'
    +'<div class="center">御会計伝票</div>'
    +'<div class="line"></div>'
    +'<div>テーブル: '+esc2(coTable)+(b.karaGuests ? '　'+b.karaGuests+'名様' : '')+'</div>'
    +'<div>'+dt+'</div>'
    +'<div class="line"></div>'
    +'<table>'+rows+'</table>'
    +'<div class="line"></div>'
    +'<table>'
    +'<tr><td>ご注文合計（税込）</td><td class="r">¥'+b.orderTotal.toLocaleString()+'</td></tr>'
    +'<tr><td>カラオケチャージ<br><span style="font-size:18px">'+esc2(b.karaLabel)+'</span></td><td class="r">¥'+b.karaCharge.toLocaleString()+'</td></tr>'
    +'<tr><td class="grand">合計</td><td class="r grand">¥'+b.grand.toLocaleString()+'</td></tr>'
    +'<tr><td>（内消費税相当額）</td><td class="r">¥'+innerTax.toLocaleString()+'</td></tr>'
    + payRows
    +'</table>'
    +'<div class="line"></div>'
    +'<div class="center">ご来店ありがとうございました🎤</div>'
    +'</body></html>';
}

function passprnt(html, withDrawer){
  var back = encodeURIComponent(location.href.split("#")[0]);
  var url = "starpassprnt://v1/print/nopreview?back=" + back + "&size=2"
          + (withDrawer ? "&drawer=start" : "")
          + "&html=" + encodeURIComponent(html);
  location.href = url;
}

function printReceipt(){
  if(!coBill){ alert("先にテーブルを選択してください"); return; }
  passprnt(buildReceiptHTML(), true);  // 印刷と同時にドロワーを開く
}

function openDrawer(){
  // 最小の印字でドロワーのみ開く（PassPRNTは印刷コマンド経由でドロワーを駆動）
  var html = '<html><head><meta charset="utf-8"></head><body style="width:384px;margin:0;font-size:10px;color:#fff">.</body></html>';
  passprnt(html, true);
}

function printTest(){
  var html = '<html><head><meta charset="utf-8"></head>'
    + '<body style="width:384px;margin:0;padding:0;font-size:24px;color:#000;font-family:sans-serif">'
    + '<div style="text-align:center;font-weight:bold">テスト印刷</div>'
    + '<div style="text-align:center">MATSUTAKE</div>'
    + '<div style="text-align:center">1 2 3</div>'
    + '</body></html>';
  passprnt(html, false);
}

// ── 会計完了 ──
function doCheckout(){
  if(!coTable || !coBill){ alert("先にテーブルを選択してください"); return; }
  var payLabel = coPay || "未選択";
  if(!confirm("テーブル"+coTable+" を会計完了にしますか？\n合計 ¥"+coBill.grand.toLocaleString()+"（"+payLabel+"）\n※回転が進み、チャージ・人数はリセットされます")) return;
  var btn = document.getElementById("co-done");
  btn.disabled = true; btn.textContent = "処理中...";
  fetch(GAS_WEBAPP_URL+"?action=checkoutTable&table="+encodeURIComponent(coTable)+"&pay="+encodeURIComponent(coPay||""))
    .then(function(r){ return r.json(); })
    .then(function(res){
      if(res && res.success){
        alert("テーブル"+coTable+" の会計を完了しました");
        coPay = null; renderPay();
        document.getElementById("co-cash").style.display = "none";
        document.getElementById("co-tender").value = "";
        loadBill();
      } else {
        alert("会計処理に失敗しました: "+(res&&res.error||"不明なエラー"));
      }
    })
    .catch(function(e){ alert("通信エラー: "+e); })
    .finally(function(){ btn.disabled=false; btn.textContent="✅ 会計完了"; });
}

// ── 来店取消（誤スキャンなどで実際には不在のとき） ──
function resetVisit(){
  if(!coTable || !coBill){ alert("先にテーブルを選択してください"); return; }
  // 注文がある卓は誤操作防止のためブロック（実来店の可能性が高い）
  if(coBill.orders.length > 0){
    alert("このテーブルには注文が入っています。\n来店取消は使えません。\n・実来店なら「✅会計完了」で締めてください\n・誤注文ならキッチンタブでキャンセルしてから再度お試しください");
    return;
  }
  if(!confirm("テーブル"+coTable+" の来店記録を取り消しますか？\n（カラオケ計時・人数を消去します。回転数は進みません）")) return;
  fetch(GAS_WEBAPP_URL+"?action=resetVisit&table="+encodeURIComponent(coTable))
    .then(function(r){ return r.json(); })
    .then(function(res){
      if(res && res.success){
        alert("テーブル"+coTable+" の来店記録を取り消しました");
        loadBill();
      } else {
        alert("取消に失敗しました: "+(res&&res.error||"不明なエラー"));
      }
    })
    .catch(function(e){ alert("通信エラー: "+e); });
}
