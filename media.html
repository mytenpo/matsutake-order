<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>📣 MATUTAKE メディアツール</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0712;min-height:100vh;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;color:#efe8f5;padding-bottom:60px}
.hdr{background:rgba(10,7,18,.97);border-bottom:1px solid rgba(255,140,60,.3);padding:12px 14px;text-align:center;position:sticky;top:0;z-index:100}
.hdr b{font-size:20px;font-weight:900;letter-spacing:1px;background:linear-gradient(135deg,#ffb46b,#ff8c3c);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr small{color:#666;font-size:11px;margin-left:6px}
.wrap{max-width:560px;margin:0 auto;padding:12px 14px}
.sec{font-size:14px;color:#999;margin:12px 0 6px;font-weight:600}
.mgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.mbtn{padding:11px 0;border-radius:10px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.04);color:#efe8f5;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.mbtn.active{border-color:#ff8c3c;background:rgba(255,140,60,.15);color:#ffb46b}
.inp{width:100%;padding:11px;border-radius:10px;border:1px solid rgba(255,255,255,.2);background:rgba(0,0,0,.35);color:#fff;font-size:15px;font-family:inherit;margin-top:7px}
textarea.inp{min-height:72px;resize:vertical}
.drow{display:flex;gap:7px;margin-top:7px}
.drow .inp{margin-top:0}
.add-btn{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#ff8c3c,#ff5e3a);color:#fff;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;margin-top:10px}
.tabs{display:flex;gap:6px;margin:16px 0 6px}
.tab{flex:1;padding:10px 0;border-radius:20px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.04);color:#bbb;font-size:13.5px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center}
.tab.active{border-color:#ff8c3c;background:rgba(255,140,60,.15);color:#ffb46b}
.card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:13px;padding:12px;margin-top:10px}
.card.overdue{border-color:rgba(229,72,77,.6)}
.card-top{display:flex;align-items:center;gap:8px}
.badge{font-size:11.5px;font-weight:800;padding:3px 9px;border-radius:20px;white-space:nowrap}
.b-insta{background:rgba(225,48,108,.2);color:#ff7eb3}
.b-line{background:rgba(6,199,85,.18);color:#4ade80}
.b-gmap{background:rgba(66,133,244,.18);color:#7fb5ff}
.b-other{background:rgba(255,255,255,.12);color:#ccc}
.card-title{flex:1;font-size:15.5px;font-weight:700;line-height:1.35}
.card-memo{font-size:13px;color:#aaa;margin-top:6px;white-space:pre-wrap;line-height:1.5}
.card-meta{font-size:12px;color:#777;margin-top:6px}
.card-meta .ov{color:#ff8a8e;font-weight:700}
.card-btns{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap}
.cb{padding:8px 12px;border-radius:9px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.05);color:#ddd;font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit}
.cb.go{border-color:#ff8c3c;color:#ffb46b}
.cb.done{border-color:#12b76a;color:#4ade80}
.cb.del{border-color:rgba(229,72,77,.5);color:#ff8a8e}
.empty{color:#555;text-align:center;padding:22px 0;font-size:14px}
.reload{width:100%;padding:9px;border-radius:10px;border:1px solid rgba(255,255,255,.12);background:transparent;color:#888;font-size:13px;cursor:pointer;font-family:inherit;margin-top:12px}
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#12b76a;color:#fff;font-size:14px;font-weight:700;padding:11px 18px;border-radius:12px;z-index:200;display:none;box-shadow:0 6px 24px rgba(0,0,0,.5)}
.toast.err{background:#e5484d}
</style>
</head>
<body>
<div class="hdr"><b>📣 MATUTAKE メディアツール</b><small>SNS・広報管理 v1</small></div>
<div class="wrap">
  <div class="sec">✏ 新しいネタ・投稿予定を追加</div>
  <div class="mgrid" id="media-grid"></div>
  <input class="inp" id="f-title" placeholder="ネタ・タイトル（例：週末イベント告知）">
  <textarea class="inp" id="f-memo" placeholder="本文メモ・ハッシュタグなど（任意）"></textarea>
  <div class="drow">
    <input class="inp" id="f-date" type="date" style="flex:1">
    <span style="align-self:center;color:#777;font-size:12px;white-space:nowrap">← 投稿予定日（空欄ならネタ帳へ）</span>
  </div>
  <button class="add-btn" onclick="addItem()">＋ 追加する</button>

  <div class="tabs">
    <div class="tab" id="tab-ネタ" onclick="selTab('ネタ')">✏ ネタ帳</div>
    <div class="tab" id="tab-予定" onclick="selTab('予定')">📅 予定</div>
    <div class="tab" id="tab-投稿済み" onclick="selTab('投稿済み')">✅ 投稿済み</div>
  </div>
  <div id="list"><div class="empty">読み込み中...</div></div>
  <button class="reload" onclick="load()">🔄 再読み込み</button>
</div>
<div class="toast" id="toast"></div>

<script>
var GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzHkfQ0hms6isOHg09y83rUktyjjO7vMCWuGv0yeeSZrZkkDhL8bKLJEGu87zJyv1h6tw/exec";

var MEDIA_DEFS = [
  {key:"Instagram", cls:"b-insta"},
  {key:"LINE", cls:"b-line"},
  {key:"Googleマップ", cls:"b-gmap"},
  {key:"その他", cls:"b-other"}
];
var selMedia = "Instagram";
var items = [];
var curTab = "ネタ";

document.getElementById("media-grid").innerHTML = MEDIA_DEFS.map(function(m){
  return '<button class="mbtn" id="mb-'+m.key+'" onclick="selM(\''+m.key+'\')">'+m.key+'</button>';
}).join("");
function selM(k){
  selMedia = k;
  MEDIA_DEFS.forEach(function(m){
    document.getElementById("mb-"+m.key).className = "mbtn"+(m.key===k?" active":"");
  });
}
selM("Instagram");

function badgeCls(media){
  var d = MEDIA_DEFS.find(function(m){ return m.key===media; });
  return d ? d.cls : "b-other";
}

function load(){
  fetch(GAS_WEBAPP_URL+"?action=mediaList")
    .then(function(r){ return r.json(); })
    .then(function(res){
      if(res && res.success){ items = res.items || []; render(); }
      else document.getElementById("list").innerHTML = '<div class="empty">取得に失敗しました</div>';
    })
    .catch(function(){ document.getElementById("list").innerHTML = '<div class="empty">通信エラー</div>'; });
}

function selTab(t){ curTab = t; render(); }

function todayStr(){
  var d = new Date();
  return d.getFullYear()+"-"+("0"+(d.getMonth()+1)).slice(-2)+"-"+("0"+d.getDate()).slice(-2);
}

function render(){
  ["ネタ","予定","投稿済み"].forEach(function(t){
    var n = items.filter(function(x){ return x.status===t; }).length;
    document.getElementById("tab-"+t).className = "tab"+(t===curTab?" active":"");
    document.getElementById("tab-"+t).textContent =
      (t==="ネタ"?"✏ ネタ帳":(t==="予定"?"📅 予定":"✅ 投稿済み")) + "（"+n+"）";
  });

  var list = items.filter(function(x){ return x.status===curTab; });
  if(curTab==="予定"){
    list.sort(function(a,b){ return (a.planned||"9999").localeCompare(b.planned||"9999"); });
  } else if(curTab==="投稿済み"){
    list.sort(function(a,b){ return (b.posted||"").localeCompare(a.posted||""); });
  } else {
    list.sort(function(a,b){ return (b.created||"").localeCompare(a.created||""); });
  }

  if(list.length===0){
    document.getElementById("list").innerHTML = '<div class="empty">'+(curTab==="ネタ"?"ネタはまだありません。思いついたらすぐメモ！":(curTab==="予定"?"投稿予定はありません":"投稿済みはまだありません"))+'</div>';
    return;
  }

  var today = todayStr();
  document.getElementById("list").innerHTML = list.map(function(x){
    var overdue = (x.status==="予定" && x.planned && x.planned < today);
    var meta = "";
    if(x.status==="ネタ") meta = "作成 "+x.created;
    if(x.status==="予定") meta = "予定日 "+(x.planned||"未設定")+(overdue?'　<span class="ov">⚠ 予定日超過</span>':"");
    if(x.status==="投稿済み") meta = "投稿 "+x.posted;

    var btns = "";
    if(x.status==="ネタ"){
      btns = '<button class="cb go" onclick="toPlan('+x.row+')">📅 予定にする</button>'
           + '<button class="cb done" onclick="toDone('+x.row+')">✅ 投稿済み</button>';
    } else if(x.status==="予定"){
      btns = '<button class="cb done" onclick="toDone('+x.row+')">✅ 投稿済みにする</button>'
           + '<button class="cb" onclick="toPlan('+x.row+')">📅 日付変更</button>';
    }
    btns += '<button class="cb" onclick="copyText('+x.row+')">📋 本文コピー</button>'
          + '<button class="cb del" onclick="delItem('+x.row+')">削除</button>';

    return '<div class="card'+(overdue?' overdue':'')+'">'
      + '<div class="card-top"><span class="badge '+badgeCls(x.media)+'">'+x.media+'</span>'
      + '<div class="card-title">'+esc(x.title)+'</div></div>'
      + (x.memo ? '<div class="card-memo">'+esc(x.memo)+'</div>' : '')
      + '<div class="card-meta">'+meta+'</div>'
      + '<div class="card-btns">'+btns+'</div>'
      + '</div>';
  }).join("");
}

function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function addItem(){
  var title = document.getElementById("f-title").value.trim();
  var memo = document.getElementById("f-memo").value.trim();
  var planned = document.getElementById("f-date").value;
  if(!title){ toast("タイトルを入力してください", true); return; }
  var data = {media:selMedia, title:title, memo:memo, planned:planned};
  fetch(GAS_WEBAPP_URL+"?action=mediaAdd&data="+encodeURIComponent(JSON.stringify(data)))
    .then(function(r){ return r.json(); })
    .then(function(res){
      if(res && res.success){
        toast(planned ? "投稿予定に追加しました" : "ネタ帳に追加しました");
        document.getElementById("f-title").value = "";
        document.getElementById("f-memo").value = "";
        document.getElementById("f-date").value = "";
        curTab = planned ? "予定" : "ネタ";
        load();
      } else toast("追加に失敗しました", true);
    }).catch(function(){ toast("通信エラー", true); });
}

function toPlan(row){
  var d = prompt("投稿予定日を入力（例：2026-07-20）", todayStr());
  if(!d) return;
  if(!/^\d{4}-\d{2}-\d{2}$/.test(d)){ toast("yyyy-mm-dd形式で入力してください", true); return; }
  update(row, "予定", d, "");
}

function toDone(row){
  if(!confirm("投稿済みにしますか？")) return;
  update(row, "投稿済み", "", "");
}

function delItem(row){
  if(!confirm("削除しますか？（シート上は「削除」状態になり非表示になります）")) return;
  update(row, "削除", "", "");
}

function update(row, status, planned, posted){
  fetch(GAS_WEBAPP_URL+"?action=mediaUpdate&row="+row+"&status="+encodeURIComponent(status)
      +"&planned="+encodeURIComponent(planned)+"&posted="+encodeURIComponent(posted))
    .then(function(r){ return r.json(); })
    .then(function(res){
      if(res && res.success){ toast("更新しました"); load(); }
      else toast("更新に失敗しました", true);
    }).catch(function(){ toast("通信エラー", true); });
}

function copyText(row){
  var x = items.find(function(i){ return i.row===row; });
  if(!x) return;
  var text = x.title + (x.memo ? "\n\n" + x.memo : "");
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(function(){ toast("本文をコピーしました（SNSアプリに貼り付けてください）"); });
  } else {
    var ta = document.createElement("textarea");
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand("copy"); document.body.removeChild(ta);
    toast("本文をコピーしました");
  }
}

var toastTimer = null;
function toast(msg, isErr){
  var el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "toast"+(isErr?" err":"");
  el.style.display = "block";
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ el.style.display="none"; }, 2600);
}

load();
</script>
</body>
</html>
