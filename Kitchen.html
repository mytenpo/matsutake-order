var audioCtx = null;
var audioBuffer = null;

function base64ToArrayBuffer(base64){
  var binary = atob(base64);
  var bytes = new Uint8Array(binary.length);
  for(var i=0;i<binary.length;i++){ bytes[i] = binary.charCodeAt(i); }
  return bytes.buffer;
}

async function initAudio(){
  try{
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if(audioCtx.state === "suspended"){ await audioCtx.resume(); }
    var base64 = BEEP_DATA_URI.split(",")[1];
    var arrayBuf = base64ToArrayBuffer(base64);
    audioBuffer = await audioCtx.decodeAudioData(arrayBuf);
  }catch(e){
    document.getElementById("status").textContent = "音声初期化エラー: " + e;
  }
}

function beep(){
  try{
    if(!audioCtx || !audioBuffer){
      document.getElementById("status").textContent = "音声が初期化されていません";
      return;
    }
    if(audioCtx.state === "suspended"){ audioCtx.resume(); }
    var source = audioCtx.createBufferSource();
    source.buffer = audioBuffer;
    source.connect(audioCtx.destination);
    source.start(0);
  }catch(e){
    document.getElementById("status").textContent = "音声再生エラー: " + e;
  }
}

var wakeLock = null;
async function requestWakeLock(){
  try{
    if("wakeLock" in navigator){
      wakeLock = await navigator.wakeLock.request("screen");
      wakeLock.addEventListener("release", function(){
        document.getElementById("status").textContent += "（画面ロック解除）";
      });
    }
  }catch(e){
    document.getElementById("status").textContent = "画面スリープ防止が使えません: " + e;
  }
}

document.addEventListener("visibilitychange", function(){
  if(document.visibilityState === "visible" && enabled){
    requestWakeLock();
  }
});

document.getElementById("enableBtn").addEventListener("click", async function(){
  await initAudio(); // ユーザー操作直後にAudioContextを初期化・アンロック
  beep(); // 確認のため一度鳴らす
  enabled = true;
  requestWakeLock();
  document.getElementById("status").textContent = "通知有効：注文を監視中…";
  document.getElementById("enableBtn").style.display = "none";
  poll();
  setInterval(poll, 8000);
});

function orderKey(o){
  return o.time + "_" + o.table + "_" + o.name + "_" + o.visit;
}

var GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzHkfQ0hms6isOHg09y83rUktyjjO7vMCWuGv0yeeSZrZkkDhL8bKLJEGu87zJyv1h6tw/exec";

function poll(){
  var now = new Date().toLocaleTimeString("ja-JP");
  fetch(GAS_WEBAPP_URL + "?action=getTodayOrders")
    .then(function(r){ return r.json(); })
    .then(function(res){
      if(!res || !res.success){
        document.getElementById("status").textContent = "取得失敗("+now+"): " + (res && res.error);
        return;
      }
      var orders = res.orders || [];
      var newOnes = [];
      orders.forEach(function(o){
        var k = orderKey(o);
        if(!knownKeys.has(k)){
          knownKeys.add(k);
          if(!firstLoad) newOnes.push(o);
        }
      });
      if(newOnes.length > 0 && enabled){
        beep();
      }
      renderList(orders, newOnes);
      firstLoad = false;
      document.getElementById("status").textContent =
        "監視中（最終チェック: "+now+"／注文件数: "+orders.length+"）";
    })
    .catch(function(err){
      document.getElementById("status").textContent = "取得エラー("+now+"): " + err;
    });
}

function renderList(orders, newOnes){
  var newKeys = new Set(newOnes.map(orderKey));
  var recent;
  try{
    recent = orders.slice().sort(function(a, b){
      var ta = String(a.time), tb = String(b.time);
      if (ta === tb) return 0;
      return ta < tb ? 1 : -1; // 時刻の新しい順（降順）
    }).slice(0, 20);
  }catch(e){
    document.getElementById("status").textContent = "並び替えエラー: " + e;
    recent = orders.slice(-20).reverse();
  }
  var list = document.getElementById("list");
  list.innerHTML = recent.map(function(o){
    var isNew = newKeys.has(orderKey(o));
    return '<div class="order-card'+(isNew?' new':'')+'">'
      + '<div><div class="order-name">'+o.name+' ×'+o.qty+'</div>'
      + '<div class="order-meta">テーブル '+o.table+'（'+o.visit+'回目）・'+o.status+'</div></div>'
      + '<div class="order-time">'+o.time+'</div></div>';
  }).join("");
}
</script>
</body>
</html>
