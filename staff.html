<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🍄 MATUTAKE スタッフ注文</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#07070f;min-height:100vh;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;color:#e8e8f5;padding-bottom:90px}
.hdr{background:rgba(7,7,15,.97);border-bottom:1px solid rgba(255,45,120,.25);padding:10px 12px;text-align:center;position:sticky;top:0;z-index:100}
.hdr b{font-size:19px;font-weight:900;letter-spacing:1px;background:linear-gradient(135deg,#ff6ba0,#ff2d78);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr small{color:#666;font-size:11px;margin-left:6px}
.wrap{max-width:560px;margin:0 auto;padding:10px 12px}
.tgrid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px}
.tbtn{padding:12px 0;border-radius:10px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.04);color:#e8e8f5;font-size:17px;font-weight:800;cursor:pointer;font-family:inherit}
.tbtn.active{border-color:#ff2d78;background:rgba(255,45,120,.15);color:#ff2d78}
.info{display:none;margin-top:8px;background:rgba(0,212,255,.06);border:1px solid rgba(0,212,255,.25);border-radius:10px;padding:8px 10px;font-size:13px;color:#9adfff}
.info.show{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
.info button{padding:6px 10px;border-radius:8px;border:1px solid rgba(0,212,255,.4);background:transparent;color:#00d4ff;font-size:13px;cursor:pointer;font-family:inherit}
.tabs{display:flex;gap:6px;overflow-x:auto;margin:12px 0 8px;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.tab{flex:0 0 auto;padding:8px 12px;border-radius:20px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.04);color:#bbb;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
.tab.active{border-color:#ff2d78;background:rgba(255,45,120,.15);color:#ff2d78}
.row{display:flex;align-items:center;gap:8px;padding:9px 4px;border-bottom:1px dashed rgba(255,255,255,.08)}
.row.sold{opacity:.35;pointer-events:none}
.row .em{font-size:20px;width:26px;text-align:center}
.row .nm{flex:1;font-size:14.5px;font-weight:600;line-height:1.3}
.row .nm small{display:block;color:#777;font-size:11px;font-weight:400}
.row .pr{font-size:13px;color:#aaa;width:58px;text-align:right}
.row .pr.hh{color:#ffd166}
.qc{display:flex;align-items:center;gap:6px}
.qc button{width:34px;height:34px;border-radius:9px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.06);color:#fff;font-size:18px;font-weight:800;cursor:pointer;font-family:inherit}
.qc button:active{background:rgba(255,45,120,.3)}
.qc .q{width:22px;text-align:center;font-size:16px;font-weight:800}
.qc .q.on{color:#ff2d78}
.bar{position:fixed;left:0;right:0;bottom:0;background:rgba(7,7,15,.97);border-top:1px solid rgba(255,45,120,.3);padding:10px 14px calc(10px + env(safe-area-inset-bottom));display:flex;align-items:center;gap:10px;z-index:100}
.bar .tot{flex:1;font-size:15px;color:#aaa}
.bar .tot b{display:block;font-size:20px;color:#fff}
.send{padding:13px 22px;border-radius:12px;border:none;background:linear-gradient(135deg,#ff2d78,#ff6b35);color:#fff;font-size:17px;font-weight:800;cursor:pointer;font-family:inherit}
.send:disabled{opacity:.4}
.clear{padding:13px 14px;border-radius:12px;border:1px solid rgba(255,255,255,.2);background:transparent;color:#888;font-size:14px;cursor:pointer;font-family:inherit}
.toast{position:fixed;top:64px;left:50%;transform:translateX(-50%);background:#12b76a;color:#fff;font-size:15px;font-weight:700;padding:12px 20px;border-radius:12px;z-index:200;display:none;box-shadow:0 6px 24px rgba(0,0,0,.5)}
.toast.err{background:#e5484d}
.mng{width:100%;margin-top:8px;padding:9px;border-radius:10px;border:1px dashed rgba(255,209,102,.5);background:transparent;color:#ffd166;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.mng.on{background:rgba(255,209,102,.15);border-style:solid}
.sob{padding:8px 12px;border-radius:9px;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.06);color:#ffd166;font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
.sob.sold{background:rgba(229,72,77,.2);border-color:#e5484d;color:#ff8a8e}
.hint{color:#666;font-size:12px;text-align:center;margin-top:10px}
</style>
</head>
<body>

</div>
<div class="bar">

  <button class="clear" onclick="clearCart()">クリア</button>

</div>

  ]}
};

var SOLD_OUT_IDS = ["f17","f17b","f19"];

// お客様側Indexと同一のハッピーアワー判定・価格ロジック
function isHappyHour(){
  var d = new Date();
  var jst = new Date(d.toLocaleString("en-US",{timeZone:"Asia/Tokyo"}));
  return jst.getHours() < 18;
}
var HH = isHappyHour();
function isDrinkItem(id){ return id.startsWith("d") || id.startsWith("b"); }
function getPrice(item){
  var hhItems = ["d1","d2","d6"];
  return (HH && hhItems.indexOf(item.id) !== -1) ? Math.floor(item.price * 0.5) : item.price;
}

// 本日のおすすめ（手書きボードの品を価格帯で注文。idは f始まり=フード扱いでキッチンに流れる）
var RECO_SUB = {label:"⭐ 本日のおすすめ", items:[
  {id:"fr380",emoji:"⭐",name:"本日のおすすめ ¥380",price:380,tag:"手書きボードの品"},
  {id:"fr480",emoji:"⭐",name:"本日のおすすめ ¥480",price:480,tag:"手書きボードの品"},
  {id:"fr580",emoji:"⭐",name:"本日のおすすめ ¥580",price:580,tag:"手書きボードの品"},
  {id:"fr680",emoji:"⭐",name:"本日のおすすめ ¥680",price:680,tag:"手書きボードの品"},
  {id:"fr780",emoji:"⭐",name:"本日のおすすめ ¥780",price:780,tag:"手書きボードの品"},
  {id:"fr880",emoji:"⭐",name:"本日のおすすめ ¥880",price:880,tag:"手書きボードの品"},
]};

// タブ構成：おすすめ＋フード＋ドリンクを一列に
var TAB_DEFS = [RECO_SUB];
Object.keys(FOOD_SUBS).forEach(function(k){ TAB_DEFS.push(FOOD_SUBS[k]); });
Object.keys(DRINK_SUBS).forEach(function(k){ TAB_DEFS.push(DRINK_SUBS[k]); });

// おすすめ品の品名メモ（キッチン表示用・任意）
var memos = {};
function setMemo(id){
  var cur = memos[id] || "";
  var t = prompt("品名メモ（キッチンのレシート・画面に表示されます）\n例：アジフライ、もつ煮込み", cur);
  if(t === null) return;
  t = t.trim();
  if(t) memos[id] = t; else delete memos[id];
  render();
}

var currentTable = null, currentTab = 0, cart = {};
var manageMode = false;

// 売り切れ情報をサーバーから取得
function loadSoldOut(){
  fetch(GAS_WEBAPP_URL + "?action=getSoldOut")
    .then(function(r){ return r.json(); })
    .then(function(res){
      if(res && res.success && res.ids){ SOLD_OUT_IDS = res.ids; render(); }
    }).catch(function(){});
}

function toggleManage(){
  manageMode = !manageMode;
  document.getElementById("mng").className = manageMode ? "mng on" : "mng";
  render();
}

function toggleSold(id){
  var isSold = SOLD_OUT_IDS.indexOf(id) !== -1;
  fetch(GAS_WEBAPP_URL + "?action=setSoldOut&id=" + encodeURIComponent(id) + "&sold=" + (isSold ? "0" : "1"))
    .then(function(r){ return r.json(); })
    .then(function(res){
      if(res && res.success){
        SOLD_OUT_IDS = res.ids;
        toast(isSold ? "販売中に戻しました" : "売り切れにしました");
        render();
      } else {
        toast("更新失敗", true);
      }
    }).catch(function(){ toast("通信エラー", true); });
}

function allItems(){
  var a = [];
  TAB_DEFS.forEach(function(t){ a = a.concat(t.items); });
  return a;
}

// ── テーブル選択 ─────────────────────────
document.getElementById("tgrid").innerHTML = ["1","2","3","4","5","6"].map(function(t){
  return '<button class="tbtn" id="tb'+t+'" onclick="selTable(\''+t+'\')">'+t+'</button>';
}).join("");

function selTable(t){
  currentTable = t;
  ["1","2","3","4","5","6"].forEach(function(x){
    document.getElementById("tb"+x).className = "tbtn"+(x===t?" active":"");
  });
  loadInfo();
  render();
}

function loadInfo(){
  var el = document.getElementById("info");
  el.className = "info show";
  el.innerHTML = "情報取得中...";
  fetch(GAS_WEBAPP_URL+"?action=getKaraokeInfo&table="+encodeURIComponent(currentTable))
    .then(function(r){return r.json();})
    .then(function(k){
      var left = "";
      if(k && k.success && k.startTime){
        var e = Math.max(0, Date.now()-Number(k.startTime));
        var h = Math.floor(e/3600000), m = Math.floor((e%3600000)/60000);
        left = "🎤 "+(k.guests?k.guests+"名様":"人数未入力")+"／"+h+"時間"+m+"分経過";
        el.innerHTML = '<span>'+left+'</span><button onclick="setG()">人数変更</button>';
      } else {
        left = "🎤 カラオケ未開始（QR未読取）";
        el.innerHTML = '<span>'+left+'</span><span><button onclick="startK()">🎤開始</button> <button onclick="setG()">人数設定</button></span>';
      }
    }).catch(function(){ el.innerHTML = "情報取得エラー"; });
}

function startK(){
  fetch(GAS_WEBAPP_URL+"?action=startKaraoke&table="+encodeURIComponent(currentTable))
    .then(function(r){return r.json();})
    .then(function(){ toast("カラオケ計時を開始しました"); loadInfo(); });
}

function setG(){
  var n = prompt("人数を入力（1〜20）","2");
  if(!n) return;
  n = parseInt(n,10);
  if(!(n>=1 && n<=20)){ toast("1〜20で入力してください", true); return; }
  fetch(GAS_WEBAPP_URL+"?action=setGuests&table="+encodeURIComponent(currentTable)+"&guests="+n)
    .then(function(r){return r.json();})
    .then(function(){ toast(n+"名様で登録しました"); loadInfo(); });
}

// ── タブ・品目リスト ─────────────────────
function renderTabs(){
  document.getElementById("tabs").innerHTML = TAB_DEFS.map(function(t,i){
    return '<button class="tab'+(i===currentTab?' active':'')+'" onclick="selTab('+i+')">'+t.label+'</button>';
  }).join("");
}
function selTab(i){ currentTab = i; render(); }

function render(){
  renderTabs();
  var items = TAB_DEFS[currentTab].items;
  document.getElementById("list").innerHTML = items.map(function(it){
    var sold = SOLD_OUT_IDS.indexOf(it.id) !== -1;
    var p = getPrice(it);
    var hh = p !== it.price;
    var q = cart[it.id] || 0;
    var right;
    if(manageMode){
      right = '<button class="sob'+(sold?' sold':'')+'" onclick="toggleSold(\''+it.id+'\')">'+(sold?'売切中→戻す':'売切にする')+'</button>';
    } else {
      right = '<div class="qc"><button onclick="chg(\''+it.id+'\',-1)">−</button>'
        + '<span class="q'+(q>0?' on':'')+'">'+q+'</span>'
        + '<button onclick="chg(\''+it.id+'\',1)">＋</button></div>';
    }
    var isReco = it.id.indexOf("fr") === 0;
    var memoHtml = isReco ? '<small style="color:'+(memos[it.id]?'#ffd166':'#555')+'">✎ '+(memos[it.id]||'メモなし（タップで入力）')+'</small>' : (it.tag?'<small>'+it.tag+'</small>':'');
    var nmAttr = isReco && !manageMode ? ' onclick="setMemo(\''+it.id+'\')" style="cursor:pointer"' : '';
    return '<div class="row'+(sold && !manageMode ?' sold':'')+'">'
      + '<div class="em">'+it.emoji+'</div>'
      + '<div class="nm"'+nmAttr+'>'+it.name+(sold?'（売切）':'')+memoHtml+'</div>'
      + '<div class="pr'+(hh?' hh':'')+'">¥'+p.toLocaleString()+(hh?'<br><s style="color:#666">¥'+it.price+'</s>':'')+'</div>'
      + right
      + '</div>';
  }).join("");
  renderBar();
}

function chg(id, d){
  var q = (cart[id]||0) + d;
  if(q <= 0) delete cart[id]; else cart[id] = q;
  render();
}

function clearCart(){ cart = {}; render(); }

function renderBar(){
  var all = allItems(), n = 0, sub = 0;
  Object.entries(cart).forEach(function(e){
    var it = all.find(function(x){return x.id===e[0];});
    n += e[1]; sub += getPrice(it)*e[1];
  });
  var tax = Math.floor(sub*0.1);
  document.getElementById("cnt").textContent = n+"点（税込）";
  document.getElementById("tot").textContent = "¥"+(sub+tax).toLocaleString();
  document.getElementById("send").disabled = !(n>0 && currentTable);
}

// ── 送信（お客様側submitOrderと同一形式） ─────
function submitOrder(){
  if(!currentTable){ toast("テーブルを選択してください", true); return; }
  var btn = document.getElementById("send");
  btn.disabled = true; btn.textContent = "送信中...";
  var all = allItems();
  var items = Object.entries(cart).map(function(e){
    var item = all.find(function(x){return x.id===e[0];});
    var p = getPrice(item);
    var nm = item.name;
    if(item.id.indexOf("fr") === 0 && memos[item.id]) nm += "（"+memos[item.id]+"）";
    if(HH&&isDrinkItem(item.id)&&!item.id.startsWith("b")&&item.id!=="d16"&&item.id!=="d17") nm += " [HH]";
    return {name:nm,emoji:item.emoji,price:p,qty:e[1],cat:(item.id.startsWith("f")?"food":"drink")};
  });
  var subtotal = items.reduce(function(s,x){return s+x.price*x.qty;}, 0);
  var tax = Math.floor(subtotal * 0.1);
  var total = subtotal + tax;
  var payload = {tableNo:currentTable, items:items, subtotal:subtotal, tax:tax, total:total};
  fetch(GAS_WEBAPP_URL + "?action=submitOrder&data=" + encodeURIComponent(JSON.stringify(payload)))
    .then(function(r){ return r.json(); })
    .then(function(res){
      if(res && res.success){
        toast("テーブル"+currentTable+"に送信しました（¥"+total.toLocaleString()+"）");
        cart = {}; memos = {};
        render();
      } else {
        toast("送信失敗: "+(res&&res.error||"不明なエラー"), true);
      }
    })
    .catch(function(e){ toast("通信エラー: "+e, true); })
    .finally(function(){ btn.textContent = "送信"; renderBar(); });
}

var toastTimer = null;
function toast(msg, isErr){
  var el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "toast"+(isErr?" err":"");
  el.style.display = "block";
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ el.style.display="none"; }, 2600);
}

renderTabs(); render(); loadSoldOut();
</script>
